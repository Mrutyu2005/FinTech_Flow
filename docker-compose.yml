version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fintech_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-dbs.sql:/docker-entrypoint-initdb.d/init-dbs.sql

  account-service:
    build:
      context: ./Account-Service/account-service
      dockerfile: Dockerfile
    container_name: account_service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/account_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - postgres

  transaction-service:
    build:
      context: ./Transaction-Service/transaction-service
      dockerfile: Dockerfile
    container_name: transaction_service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/transaction_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
      - ACCOUNT_SERVICE_URL=http://account-service:8081
    depends_on:
      - postgres
      - account-service

  frontend:
    build:
      context: ./fintech-frontend
      dockerfile: Dockerfile
    container_name: fintech_frontend
    ports:
      - "80:80"
    depends_on:
      - account-service
      - transaction-service

volumes:
  postgres_data:
